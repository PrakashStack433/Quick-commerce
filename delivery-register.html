<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite — Delivery Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0D0B; --surface: #1A1714; --card: #231F1B; --border: #2E2A26;
      --orange: #1dc917; --orange-soft: #FF8F5A; --cream: #F5EDD8; --cream-muted: #B8A99A;
      --green: #22C55E; --red: #EF4444; --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; background: var(--bg); color: var(--cream); font-family: var(--font-body); }
    .card { width: 100%; max-width: 460px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; }
    .title { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; color: var(--cream); margin-bottom: 0.3rem; }
    .subtitle { color: var(--cream-muted); font-size: 0.95rem; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 12px; color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--cream); font-size: 14px; }
    input:focus { outline: none; border-color: var(--orange); }
    .btn { width: 100%; margin-top: 0.5rem; padding: 14px; border: none; border-radius: 12px; font-family: var(--font-head); font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--orange); color: white; }
    .btn:hover { background: var(--orange-soft); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; display: none; }
    .message.error { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
    .message.success { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }
    .message.show { display: block; }
    .link { margin-top: 1rem; text-align: center; color: var(--cream-muted); font-size: 0.9rem; }
    .link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Delivery Agent Registration</h1>
    <p class="subtitle">Your request will be reviewed by the admin before you can log in.</p>
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="Enter your full name" required />
      </div>
      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input id="mobile" type="tel" maxlength="10" pattern="[0-9]{10}" placeholder="98XXXXXXXX" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Create a strong password" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Re-enter password" required />
      </div>
      <div class="message" id="message"></div>
      <button class="btn" id="submitBtn" type="submit">Submit Request</button>
    </form>
    <div class="link">
      <a href="delivery-login.html">Already registered? Login here</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type} show`;
      setTimeout(() => message.classList.remove('show'), 4000);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        name: document.getElementById('name').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value
      };

      submitBtn.disabled = true;
      try {
        const res = await fetch('http://localhost:3000/api/delivery/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          showMessage('Registration submitted successfully. Waiting for admin approval.', 'success');
          form.reset();
        } else {
          showMessage(data.error || 'Registration failed', 'error');
        }
      } catch (error) {
        showMessage('Connection error', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
