<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0F0D0B; --surface: #1A1714; --card: #231F1B; --border: #2E2A26;
      --orange: #1dc917; --orange-soft: #FF8F5A; --cream: #F5EDD8; --cream-muted: #B8A99A;
      --green: #22C55E; --red: #EF4444; --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body {
      background: var(--bg); color: var(--cream); font-family: var(--font-body);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .login-box {
      width: 100%; max-width: 420px; position: relative; animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      text-align: center; margin-bottom: 2rem;
    }
    .logo-text {
      font-family: var(--font-head); font-size: 2rem; font-weight: 800;
      color: var(--orange); letter-spacing: -0.03em;
    }
    .logo-text span { color: var(--cream); }
    .logo-sub {
      font-size: 0.8rem; color: var(--cream-muted); margin-top: 4px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.75rem;
    }
    /* Container to properly position the eye button */
.password-wrapper {
  position: relative;
  width: 100%;
}

/* Ensure password input text doesn't slide underneath the button */
.password-wrapper .form-input {
  padding-right: 42px;
}

/* Base configuration for the eye action element */
.eye-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, opacity 0.2s;
  
  /* 🎨 EYE BUTTON COLOR: Starts as your muted cream tone */
  color: var(--cream-muted); 
}

/* Hover color state matching your theme's active accent color */
.eye-btn:hover {
  color: rgb(108, 107, 107);
}

/* Clean fallback to remove any native hidden buttons in Edge/IE */
.form-input[type="password"]::-ms-reveal,
.form-input[type="password"]::-ms-clear {
  display: none;
}
    .form-group { margin-bottom: 1rem; }
    .form-label {
      font-size: 12px; color: white; margin-bottom: 6px; display: block;
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--cream); padding: 11px 14px; border-radius: 10px; font-size: 14px;
      font-family: var(--font-body); outline: none; transition: border-color 0.2s;
    }
    .form-input[type="password"]::-ms-reveal,
    .form-input[type="password"]::-ms-clear,
    .form-input[type="password"]::-webkit-textfield-decoration-button,
    .form-input[type="password"]::-webkit-textfield-decoration-container {
      color: white;
    }
    .form-input:focus { border-color: var(--orange); }
    .form-input::placeholder { color: rgb(108, 107, 107); }
    .btn-primary {
      width: 100%; background: var(--orange); color: white; border: none;
      padding: 14px; border-radius: 12px; font-family: var(--font-head); font-size: 1rem;
      font-weight: 700; cursor: pointer; letter-spacing: 0.02em; transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-primary:hover { background: var(--orange-soft); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; display: none;
    }
    .message.error { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
    .message.success { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }
    .message.show { display: block; }
    .loader { display: none; width: 20px; height: 20px; border: 3px solid var(--cream-muted);
      border-top-color: var(--orange); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-links { margin-top: 1.5rem; text-align: center; color: var(--cream-muted); font-size: 0.9rem; }
    .auth-links a { color: var(--orange); text-decoration: none; font-weight: 500; }
    .auth-links a:hover { text-decoration: underline; }
    .otp-center { text-align: center; }
  </style>
</head>
<body>
  <div class="dots-bg"></div>
  <div class="glow"></div>

  <div class="login-box">
    <div class="logo">
      <div class="logo-text">Quick<span>Bite</span></div>
      <div class="logo-sub">30-minute delivery · Agra</div>
    </div>
    
<!--     Login Form -->
    <div class="card" id="loginCard">
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" class="form-input" placeholder="98XXXXXXXX" maxlength="10" pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            <button type="button" id="togglePassword" class="eye-btn" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="message" id="message"></div>
        <div class="loader" id="loader"></div>
        <button type="submit" class="btn-primary" id="submitBtn">Login</button>
      </form>
    </div>

    <div class="auth-links">
      <p>Don't have an account? <a href="registration-new.html">Sign up here</a></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const mobileInput = document.getElementById('mobile');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');
    const loader = document.getElementById('loader');
    const submitBtn = document.getElementById('submitBtn');

    //password reveal
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', function () {
      // Check the current type and switch it
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Visual indicator: Make icon brighter when password becomes visible
      if (type === 'text') {
        this.style.color = 'var(--orange)';
        this.style.opacity = '1';
      } else {
        this.style.color = 'var(--cream-muted)';
        this.style.opacity = '0.7';
      }
    });

    function isValidMobileNumber(mobile) {
      return /^[6-9]\d{9}$/.test(mobile);
    }

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type} show`;
      setTimeout(() => messageDiv.classList.remove('show'), 4000);
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const mobile = mobileInput.value.trim();
      const password = passwordInput.value;

      if (!mobile || !password) {
        showMessage('Mobile number and password required', 'error');
        return;
      }
      if (!isValidMobileNumber(mobile)) {
        showMessage('Invalid mobile number', 'error');
        return;
      }

      loader.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const response = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ mobile, password })
        });
        const data = await response.json();
        if (response.ok) {
          showMessage('✓ Login successful!', 'success');
          localStorage.setItem('qb_user_id', data.user.id);
          localStorage.setItem('qb_user_mobile', data.user.mobile);
          localStorage.setItem('qb_user_role', data.user.role);
          setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
          showMessage(data.error || 'Login failed', 'error');
        }
      } catch (error) {
        showMessage('Connection error', 'error');
      } finally {
        loader.style.display = 'none';
        submitBtn.disabled = false;
      }
    });

  </script>
</body>
</html>
