<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite — Delivery Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0D0B; --surface: #1A1714; --card: #231F1B; --border: #2E2A26;
      --orange: #1dc917; --orange-soft: #FF8F5A; --cream: #F5EDD8; --cream-muted: #B8A99A;
      --green: #22C55E; --red: #EF4444; --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--cream); font-family: var(--font-body); min-height: 100vh; padding: 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; color: var(--orange); }
    .btn { background: var(--orange); color: white; border: none; padding: 0.7rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 700; }
    .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--cream); }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.9rem; }
    .stat-label { font-size: 0.8rem; color: var(--cream-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-family: var(--font-head); font-size: 1.2rem; margin-top: 0.2rem; color: var(--cream); }
    .order { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.95rem; margin-top: 0.75rem; }
    .order-top { display: flex; justify-content: space-between; gap: 1rem; align-items: center; margin-bottom: 0.55rem; }
    .badge { padding: 0.28rem 0.65rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .badge.new { background: rgba(255, 107, 43, 0.2); color: var(--orange); }
    .badge.pickup { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
    .badge.enroute { background: rgba(167, 139, 250, 0.2); color: #A78BFA; }
    .badge.done { background: rgba(34, 197, 94, 0.2); color: var(--green); }
    .muted { color: var(--cream-muted); font-size: 0.9rem; line-height: 1.5; }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .empty { text-align: center; color: var(--cream-muted); padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <div class="title">Delivery Dashboard</div>
          <div class="muted">Manage incoming delivery orders</div>
        </div>
        <button class="btn secondary" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="card">
      <div class="stats">
        <div class="stat"><div class="stat-label">Delivered</div><div class="stat-value" id="stat-delivered">0</div></div>
        <div class="stat"><div class="stat-label">Earnings</div><div class="stat-value" id="stat-earnings">₹0</div></div>
        <div class="stat"><div class="stat-label">Status</div><div class="stat-value" id="stat-status">Online</div></div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:0.5rem">Active orders</h3>
      <div id="orders"></div>
    </div>
  </div>

  <script>
    async function checkAccess() {
      try {
        const res = await fetch('http://localhost:3000/api/me', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok || !data.authenticated || data.user.role !== 'delivery') {
          window.location.href = 'delivery-login.html';
          return false;
        }
        return true;
      } catch (error) {
        window.location.href = 'delivery-login.html';
        return false;
      }
    }

    async function logout() {
      await fetch('http://localhost:3000/api/logout', { method: 'POST', credentials: 'include' });
      localStorage.removeItem('qb_user_role');
      window.location.href = 'delivery-login.html';
    }

    async function loadOrders() {
      const res = await fetch('http://localhost:3000/api/orders');
      const data = await res.json();
      const list = document.getElementById('orders');
      if (!data.success || !data.orders.length) {
        list.innerHTML = '<div class="empty">No orders yet.</div>';
        return;
      }
      const deliveredCount = data.orders.filter(o => o.status === 'done').length;
      document.getElementById('stat-delivered').textContent = deliveredCount;
      document.getElementById('stat-earnings').textContent = '₹' + (deliveredCount * 35);
      list.innerHTML = data.orders.map(order => `
        <div class="order">
          <div class="order-top">
            <strong>#${order.id}</strong>
            <span class="badge ${order.status}">${order.status}</span>
          </div>
          <div class="muted">📍 ${order.address}</div>
          <div class="muted">📱 ${order.userMobile}</div>
          <div class="muted">🧾 ${order.items}</div>
          <div class="muted">💰 ₹${order.total}</div>
          <div class="actions">
            ${order.status !== 'done' ? `<button class="btn" onclick="advanceStatus('${order.id}', '${order.status}')">Advance</button>` : '<button class="btn" disabled>Delivered</button>'}
          </div>
        </div>
      `).join('');
    }

    async function advanceStatus(id, currentStatus) {
      const nextMap = { new: 'pickup', pickup: 'enroute', enroute: 'done' };
      const nextStatus = nextMap[currentStatus];
      await fetch('http://localhost:3000/api/orders/update-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, nextStatus })
      });
      loadOrders();
    }

    checkAccess().then(ok => { if (ok) loadOrders(); });
  </script>
</body>
</html>
